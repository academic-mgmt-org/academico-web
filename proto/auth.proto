syntax = "proto3";

package auth;

option php_namespace = "App\\Grpc\\Auth";
option php_metadata_namespace = "App\\Grpc\\Auth\\GPBMetadata";

// Servicio de autenticación
service AuthService {
    rpc Login (LoginRequest) returns (LoginResponse);
}

// Estructura de la petición
message LoginRequest {
    string username = 1;
    string password = 2;
}

// Estructura de la respuesta
message LoginResponse {
    bool success = 1;
    string token = 2;
    string message = 3;
    User user = 4;
}

// Estructura del usuario
message User {
    string username = 1;
    string name = 2;
    string role = 3;
}
