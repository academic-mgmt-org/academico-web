# Docker
# Build and push academico-web image to Azure Container Registry

trigger:
  branches:
    include:
    - main

pr: none

resources:
- repo: self

variables:
  dockerRegistryServiceConnection: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'
  imageRepository: 'academicmgmtorgacademicoweb'
  containerRegistry: 'acracademicoutn.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), ne(variables['Build.Reason'], 'PullRequest'))
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        buildContext: '$(Build.SourcesDirectory)'
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest
        addPipelineData: false
